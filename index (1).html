  /* ═══ إعادة تعيين عامة ═══ */
  * { -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans Arabic', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;

  }

  button, input, select, textarea {

  }

  .font-display {

  .num {

    font-feature-settings: 'tnum';
    direction: ltr;

  [type=number]::-webkit-inner-spin-button,
  [type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  /* ═══ Animations ═══ */
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-slide { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .animate-fade { animation: fadeIn 0.5s ease-out; }

  @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .animate-pop { animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .animate-float { animation: float 3s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent) 50%, var(--text-primary) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }

  /* ═══ Glass effect ═══ */
  .glass {
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
  }

  /* ═══ Custom scrollbar (مخفي على iOS) ═══ */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

  /* ═══ Component Classes ═══ */
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    box-shadow: var(--shadow-sm);

  .card-elevated {

    border-radius: 20px;
    box-shadow: var(--shadow-lg);
  }

  .input-field {
    background: var(--bg-surface);
    border: 1.5px solid var(--border-medium);

    border-radius: 12px;
    padding: 11px 14px;

  .input-field:disabled {

  .input-field::placeholder { color: var(--text-quaternary); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--bg-subtle);
    color: var(--text-primary);
    padding: 11px 22px;
    border-radius: 12px;
    font-weight: 700;
    border: 1px solid var(--border-subtle);

  .btn-secondary:hover { background: var(--bg-hover); }

  .btn-danger {

  .login-bg::before {

    right: 2px;

    height: 20px;

  html.dark .bg-white { background: var(--bg-surface) !important; color: var(--text-primary); }
  html.dark .bg-slate-50, html.dark .bg-slate-100 { background: var(--bg-subtle) !important; }
  html.dark .text-slate-500, html.dark .text-slate-600, html.dark .text-slate-700 { color: var(--text-secondary) !important; }
  html.dark .text-slate-400 { color: var(--text-tertiary) !important; }
  html.dark .text-slate-900 { color: var(--text-primary) !important; }
  html.dark .border-slate-100, html.dark .border-slate-200, html.dark .border-slate-300 { border-color: var(--border-subtle) !important; }
  html.dark input, html.dark select, html.dark textarea { color: var(--text-primary) !important; background: var(--bg-surface); }
  html.dark .bg-amber-50, html.dark .bg-amber-100 { background: var(--warning-soft) !important; }
  html.dark .text-amber-700, html.dark .text-amber-800, html.dark .text-amber-900 { color: var(--warning-light) !important; }
  html.dark .bg-emerald-50, html.dark .bg-emerald-100 { background: var(--success-soft) !important; }
  html.dark .text-emerald-700, html.dark .text-emerald-800, html.dark .text-emerald-900 { color: var(--success-light) !important; }
  html.dark .text-emerald-600 { color: var(--success) !important; }
  html.dark .bg-rose-50, html.dark .bg-rose-100 { background: var(--danger-soft) !important; }

  html.dark .bg-indigo-50, html.dark .bg-indigo-100, html.dark .bg-blue-50 { background: var(--info-soft) !important; }

  /* ═══ Smooth scroll للموبايل ═══ */
  html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

<script type="module">
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════════════════════════
// 🌐 الحالة العامة (State)
// ═══════════════════════════════════════════════════════════════
const state = {
  user: null, users: [], settings: null, page: 'dashboard', loading: true,
  sheet: null, sheetDate: new Date().toISOString().split('T')[0],
  sheetShift: new Date().getHours() < 14 ? 'morning' : 'evening',
  debts: [], history: [], logs: [],
  debtFilter: 'open', debtSearch: '',
  historyMonth: new Date().toISOString().slice(0, 7),
  showAddUser: false, editingUser: null,
  modal: null,
  theme: localStorage.getItem('lab_theme') || 'light',
};

// 🌓 تبديل الثيم
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('lab_theme', state.theme);
  if (state.theme === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  render();
}
window.__toggleTheme = toggleTheme;

// 🏥 شعار المختبر (SVG inline) - يدعم شعار مخصص من الإعدادات
function labLogo(size = 40, glow = false) {
  // إذا كان هناك شعار مخصص (Base64) في الإعدادات
  const customLogo = state.settings?.customLogo;
  if (customLogo && customLogo.startsWith('data:image')) {
    return `<img src="${customLogo}" width="${size}" height="${size}" class="${glow ? 'logo-glow' : ''} rounded-2xl object-cover" alt="شعار المختبر" style="width:${size}px;height:${size}px">`;
  }

  // الشعار الافتراضي
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" class="${glow ? 'logo-glow' : ''}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3b82f6"/>
        <stop offset="100%" style="stop-color:#1d4ed8"/>
      </linearGradient>
      <linearGradient id="logoGlass" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
        <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
      </linearGradient>
    </defs>

    <!-- Hexagonal frame -->
    <path d="M50 5 L88 27 L88 73 L50 95 L12 73 L12 27 Z"
          fill="url(#logoGrad)" stroke="#0f172a" stroke-width="2" stroke-opacity="0.2"/>

    <!-- Inner border -->
    <path d="M50 12 L82 30 L82 70 L50 88 L18 70 L18 30 Z"
          fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Lab vial silhouette -->
    <g fill="#fff">
      <path d="M42 30 L42 55 Q42 65 50 65 Q58 65 58 55 L58 30 Z" opacity="0.95"/>
      <rect x="44" y="25" width="12" height="6" rx="1"/>
      <path d="M43 50 L57 50 L57 55 Q57 63 50 63 Q43 63 43 55 Z" fill="#0f172a" opacity="0.25"/>
      <circle cx="50" cy="75" r="3" opacity="0.9"/>
    </g>

    <!-- Highlight -->
    <path d="M50 8 L85 28 L85 50 L50 30 Z" fill="url(#logoGlass)"/>
  </svg>`;
}
window.__labLogo = labLogo;

// ═══════════════════════════════════════════════════════════════
// 🔌 طبقة الاتصال بقاعدة البيانات
// ═══════════════════════════════════════════════════════════════
const api = {
  async getUsers() {
    const { data, error } = await sb.from('users').select('*').order('created_at');
    if (error) throw error;
    return data || [];
  },
  async login(username, password) {
    const { data } = await sb.from('users').select('*')
      .ilike('username', username).eq('password', password).eq('active', true).maybeSingle();
    return data;
  },
  async upsertUser(user) {
    const { error } = await sb.from('users').upsert(user);
    if (error) throw error;
  },
  async deleteUser(username) {
    await sb.from('users').delete().eq('username', username);
  },
  async getSettings() {
    const { data } = await sb.from('settings').select('data').eq('id', 1).single();
    return data?.data;
  },
  async saveSettings(settings) {
    await sb.from('settings').upsert({ id: 1, data: settings, updated_at: new Date().toISOString() });
  },
  async getSheet(date, shift) {
    const id = `${date}:${shift}`;
    const { data } = await sb.from('sheets').select('*').eq('id', id).maybeSingle();
    return data;
  },
  async saveSheet(date, shift, sheetData, username) {
    const id = `${date}:${shift}`;
    await sb.from('sheets').upsert({
      id, date, shift, data: sheetData,
      closed: sheetData.closed || false,
      closed_by: sheetData.closedBy || null,
      closed_at: sheetData.closedAt ? new Date(sheetData.closedAt).toISOString() : null,
      last_edited_by: username,
      updated_at: new Date().toISOString(),
    });
  },
  async getRecentSheets(limit = 100) {
    const { data } = await sb.from('sheets').select('*').order('date', { ascending: false }).limit(limit);
    return data || [];
  },
  async getDebts() {
    const { data } = await sb.from('debts').select('*').order('created_at', { ascending: false });
    return data || [];
  },
  async addDebt(debt) { await sb.from('debts').insert(debt); },
  async updateDebt(id, patch) { await sb.from('debts').update(patch).eq('id', id); },
  async deleteDebt(id) { await sb.from('debts').delete().eq('id', id); },
  async log(username, action, details) {
    await sb.from('activity_logs').insert({ username, action, details });
  },
  async getLogs(limit = 200) {
    const { data } = await sb.from('activity_logs').select('*').order('created_at', { ascending: false }).limit(limit);
    return data || [];
  },
};

// 📡 المزامنة اللحظية (Realtime)
// ═══════════════════════════════════════════════════════════════
function setupRealtime() {
  sb.channel('sheets-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sheets' }, async (p) => {
      if (p.new?.id === `${state.sheetDate}:${state.sheetShift}` && p.new.last_edited_by !== state.user?.username) {
        state.sheet = p.new;
        toast(`تحديث من ${p.new.last_edited_by}`, 'info');
        render();
      }
      if (['history', 'dashboard', 'reports'].includes(state.page)) {
        state.history = await api.getRecentSheets(); render();
      }
    }).subscribe();

  sb.channel('debts-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'debts' }, async () => {
      state.debts = await api.getDebts();
      if (['debts', 'dashboard', 'closing'].includes(state.page)) render();
    }).subscribe();

  sb.channel('settings-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, async () => {
      state.settings = await api.getSettings(); render();
    }).subscribe();

  sb.channel('users-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, async () => {
      state.users = await api.getUsers();
      if (state.page === 'users') render();
    }).subscribe();
}

const fmt = (n) => {
  const num = Number(n) || 0;
  return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
};
const fmt2 = (n) => (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
const fmtDate = (d) => new Date(d).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
const fmtDT = (d) => new Date(d).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
const uid = () => String(Date.now()) + Math.random().toString(36).slice(2, 8);

function toast(msg, type = 'success') {
  const root = document.getElementById('toast-root');
  const colors = {
    success: 'bg-emerald-600',
    error: 'bg-rose-600',
    info: 'bg-indigo-600',
    warn: 'bg-amber-600',
  };
  const div = document.createElement('div');
  div.className = `${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg animate-slide flex items-center gap-2 text-sm font-bold`;
  div.innerHTML = `<span>${msg}</span>`;
  root.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transform = 'translateY(-10px)'; div.style.transition = 'all 0.3s'; }, 2500);
  setTimeout(() => div.remove(), 3000);
}

function emptySheet() {
  return {
    systemTotal: '', openingCash: '', bankTransfers: [], expenses: [],
    newDebts: [], debtCollections: [], actualCashCount: '', notes: '',
    closed: false
  };
}

function calculateSheet(s) {
  const data = s?.data || s || {};
  const num = (v) => Number(v) || 0;
  const sum = (arr) => round2((arr || []).reduce((t, x) => t + num(x.amount), 0));
  const systemTotal = round2(num(data.systemTotal));
  const opening = round2(num(data.openingCash));
  const transfers = sum(data.bankTransfers);
  const expenses = sum(data.expenses);
  const newDebts = sum(data.newDebts);
  const collections = sum(data.debtCollections);
  const actualCash = round2(num(data.actualCashCount));
  const cashRevenue = round2(systemTotal - transfers - newDebts);
  const expectedCash = round2(opening + cashRevenue + collections - expenses);
  const difference = round2(actualCash - expectedCash);
  return { systemTotal, opening, transfers, expenses, newDebts, collections, actualCash, cashRevenue, expectedCash, difference };
}

          ${isAdmin ? mobBtn({ id: 'reports', label: 'الإدارة', icon: 'settings' }, ['users','settings','logs','reports'].includes(state.page)) : ''}
        </div>
      </nav>
    </div>
  </div>`;
}

function navBtn(i, active) {
  if (active) {
    return `<button data-nav="${i.id}" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition relative overflow-hidden" style="background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #fff; box-shadow: 0 4px 12px rgba(245,158,11,0.25)">
      <i data-lucide="${i.icon}" class="w-5 h-5"></i>
      <span class="flex-1 text-right">${i.label}</span>
      <i data-lucide="chevron-left" class="w-4 h-4"></i>
    </button>`;
  }
  return `<button data-nav="${i.id}" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition hover:bg-opacity-50" style="color: var(--text-secondary)" onmouseover="this.style.background='var(--bg-tertiary)'" onmouseout="this.style.background='transparent'">
    <i data-lucide="${i.icon}" class="w-5 h-5"></i>
    <span>${i.label}</span>
  </button>`;
}

function mobBtn(i, active) {
  return `<button data-nav="${i.id}" class="flex flex-col items-center gap-0.5 py-1.5 rounded-xl transition" style="color: ${active ? 'var(--gold)' : 'var(--text-tertiary)'}">
    <div class="${active ? 'p-1.5 rounded-lg' : ''}" ${active ? 'style="background: var(--gold-soft)"' : ''}>
      <i data-lucide="${i.icon}" class="w-5 h-5"></i>
    </div>
    <span class="text-[10px] font-bold">${i.label}</span>
  </button>`;
}

function renderPage() {
  const isAdmin = state.user.role === 'admin';
  const adminOnly = ['reports', 'users', 'settings', 'logs'];
  if (adminOnly.includes(state.page) && !isAdmin) {
    return `<div class="p-8 max-w-md mx-auto text-center">
      <div class="card p-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-2xl flex items-center justify-center" style="background: var(--rose-soft); color: var(--rose)">
          <i data-lucide="shield-x" class="w-8 h-8"></i>
        </div>
        <h2 class="font-display text-xl font-bold mb-2" style="color: var(--text-primary)">صلاحيات غير كافية</h2>
        <p class="text-sm" style="color: var(--text-secondary)">هذه الصفحة متاحة للمدير العام فقط.</p>
      </div>
    </div>`;
  }
  switch (state.page) {
    case 'dashboard': return renderDashboard();
    case 'closing':   return renderClosing();
    case 'debts':     return renderDebts();
    case 'history':   return renderHistory();
    case 'reports':   return renderReports();
    case 'users':     return renderUsers();
    case 'settings':  return renderSettings();
    case 'logs':      return renderLogs();
    default: return '<div class="p-8">صفحة غير موجودة</div>';
  }
}

async function loadPageData() {
  if (state.page === 'closing') state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
  if (state.page === 'debts') state.debts = await api.getDebts();
  if (['history', 'dashboard'].includes(state.page)) {
    state.history = await api.getRecentSheets();
    state.debts = await api.getDebts();
  }
  if (state.page === 'logs') state.logs = await api.getLogs();
  if (state.page === 'reports') state.history = await api.getRecentSheets();
}

// 📊 صفحة لوحة المتابعة (مختلفة للمدير وموظفي الاستقبال)
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  if (state.user.role === 'admin') return renderAdminDashboard();
  return renderReceptionDashboard();
}

// 🧑‍💼 لوحة موظف الاستقبال (مبسطة، بدون أرقام مالية حساسة)

        <div class="w-16 h-16 rounded-2xl flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--gold), var(--gold-light)); box-shadow: 0 8px 24px rgba(245,158,11,0.3)">

        </div>

          <p class="text-sm mt-1" style="color: var(--text-secondary)">${fmtDate(new Date())}</p>
          <div class="flex items-center gap-2 mt-2">
            <span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background: var(--teal-soft); color: var(--teal)">
              <i data-lucide="${currentShift === 'morning' ? 'sun' : 'moon'}" class="w-3 h-3 inline"></i>
              الفترة ${currentShift === 'morning' ? 'الصباحية' : 'المسائية'}
            </span>
            ${currentClosed ?
              `<span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background: var(--rose-soft); color: var(--rose)"><i data-lucide="lock" class="w-3 h-3 inline"></i> مغلقة</span>` :
              `<span class="text-xs px-2 py-0.5 rounded-full font-bold animate-pulse" style="background: rgba(16,185,129,0.1); color: #10b981"><span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> جارية</span>`
            }

    <!-- إجراءات سريعة -->

      ${quickAction('إضافة دين', 'تسجيل دين جديد', 'plus-circle', 'amber', 'debts')}
      ${quickAction('تحصيل دين', 'تسجيل دفعة', 'check-circle', 'teal', 'debts')}
      ${quickAction('سجل اليوم', 'مراجعة الفترات', 'calendar', 'sky', 'history')}
    </div>

    <!-- بطاقات حالة العمل (بدون أرقام إيراد) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
      <div class="card p-5">
        <div class="flex items-start gap-3">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style="background: var(--gold-soft); color: var(--gold)">
            <i data-lucide="alert-circle" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <div class="text-xs font-bold uppercase tracking-wider" style="color: var(--text-tertiary)">ديون مفتوحة</div>
            <div class="text-3xl font-bold mt-1 num" style="color: var(--text-primary)">${openDebts.length}</div>
            <div class="text-xs mt-1" style="color: var(--text-secondary)">عميل لم يسدد بعد</div>
            ${overdueDebts.length > 0 ? `<div class="text-xs mt-2 px-2 py-1 rounded inline-flex items-center gap-1" style="background: var(--rose-soft); color: var(--rose)"><i data-lucide="alert-triangle" class="w-3 h-3"></i> ${overdueDebts.length} متأخر أكثر من ٧ أيام</div>` : ''}
          </div>
        </div>
      </div>

      <div class="card p-5">
        <div class="flex items-start gap-3">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style="background: var(--teal-soft); color: var(--teal)">
            <i data-lucide="activity" class="w-6 h-6"></i>
          </div>

            <div class="text-xs font-bold uppercase tracking-wider" style="color: var(--text-tertiary)">حالة اليوم</div>

            <div class="text-lg font-bold" style="color: var(--text-primary)">

        <li class="flex gap-2"><span class="font-bold" style="color: var(--gold)">٢.</span> سجّل التحويلات البنكية والبطاقات (لا تدخل الدرج)</li>
        <li class="flex gap-2"><span class="font-bold" style="color: var(--gold)">٣.</span> سجّل الديون الجديدة (الحالات المؤجلة)</li>
        <li class="flex gap-2"><span class="font-bold" style="color: var(--gold)">٤.</span> سجّل المصروفات التي خرجت من الدرج</li>
        <li class="flex gap-2"><span class="font-bold" style="color: var(--gold)">٥.</span> عُدّ الكاش الفعلي وأدخل المبلغ</li>
        <li class="flex gap-2"><span class="font-bold" style="color: var(--gold)">٦.</span> إذا ظهر فرق، راجع الإدخالات قبل الإغلاق</li>
      </ol>

  </div>`;
}

function quickAction(title, subtitle, icon, color, page) {
  const colors = {
    gold:  { bg: 'var(--gold-soft)',  fg: 'var(--gold)' },
    amber: { bg: 'rgba(251,191,36,0.1)', fg: '#d97706' },
    teal:  { bg: 'var(--teal-soft)',  fg: 'var(--teal)' },
    sky:   { bg: 'var(--sky-soft)',   fg: 'var(--sky)' },
  };
  const c = colors[color];
  return `<button data-nav="${page}" class="card p-4 text-right hover:shadow-md transition group">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2 group-hover:scale-110 transition" style="background: ${c.bg}; color: ${c.fg}">
      <i data-lucide="${icon}" class="w-5 h-5"></i>
    </div>
    <div class="font-bold text-sm" style="color: var(--text-primary)">${title}</div>
    <div class="text-xs mt-0.5" style="color: var(--text-tertiary)">${subtitle}</div>
  </button>`;
}

// 👔 لوحة المدير (كاملة بالأرقام والتحليلات)
function renderAdminDashboard() {
  const today = new Date().toISOString().split('T')[0];
  const todayMorn = state.history.find(s => s.id === `${today}:morning`);
  const todayEven = state.history.find(s => s.id === `${today}:evening`);
  const calcMorn = calculateSheet(todayMorn);
  const calcEven = calculateSheet(todayEven);

  // 📊 إحصائيات اليوم الكامل (الفترتين معاً)
  const todayTotal = {
    systemRevenue: round2(calcMorn.systemTotal + calcEven.systemTotal),
    cashActual: round2(calcMorn.actualCash + calcEven.actualCash),
    expectedCash: round2(calcMorn.expectedCash + calcEven.expectedCash),
    transfers: round2(calcMorn.transfers + calcEven.transfers),
    expenses: round2(calcMorn.expenses + calcEven.expenses),
    newDebts: round2(calcMorn.newDebts + calcEven.newDebts),
    collections: round2(calcMorn.collections + calcEven.collections),
    diff: round2(calcMorn.difference + calcEven.difference),
  };

  // 💳 تجميع التحويلات حسب طريقة الدفع
  const todayByMethod = {};
  for (const sh of [todayMorn, todayEven]) {
    (sh?.data?.bankTransfers || []).forEach(t => {
      if (!t.method) return;
      todayByMethod[t.method] = round2((todayByMethod[t.method] || 0) + Number(t.amount || 0));
    });
  }

  const openDebts = state.debts.filter(d => d.status === 'open');
  const openDebtsAmount = round2(openDebts.reduce((s, d) => s + Number(d.amount), 0));

  let weekRev = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const m = state.history.find(s => s.id === `${ds}:morning`);
    const e = state.history.find(s => s.id === `${ds}:evening`);
    weekRev += (Number(m?.data?.systemTotal) || 0) + (Number(e?.data?.systemTotal) || 0);
  }
  weekRev = round2(weekRev);

  const tolerance = state.settings?.diffTolerance || 50;
  const cur = state.settings?.currency || '';

  return `<div class="p-4 lg:p-8 max-w-7xl mx-auto">
    ${pageHeader('لوحة المتابعة', `مرحباً ${state.user.display_name || state.user.username} · ${fmtDate(new Date())}`, 'layout-dashboard')}

    <!-- ═══ KPIs العامة ═══ -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4 mb-6">
      ${kpiCard('إيراد اليوم', todayTotal.systemRevenue, cur, 'trending-up', 'success')}
      ${kpiCard('إيراد ٧ أيام', weekRev, cur, 'bar-chart-3', 'accent')}
      ${kpiCard('ديون مفتوحة', openDebtsAmount, cur, 'alert-circle', 'warning', `${openDebts.length} حالة`)}
      ${kpiCard('فرق اليوم', todayTotal.diff, cur, 'wallet', Math.abs(todayTotal.diff) < tolerance ? 'success' : 'danger', null, true)}
    </div>

    <!-- ═══ 📊 تقرير اليوم الكامل ═══ -->
    <div class="card-elevated mb-6 overflow-hidden">
      <div class="p-4 border-b flex items-center justify-between flex-wrap gap-2" style="border-color: var(--border-subtle)">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff">
            <i data-lucide="calendar-days" class="w-5 h-5"></i>
          </div>
          <div>
            <h3 class="font-display font-bold text-lg" style="color: var(--text-primary)">ملخص اليوم الكامل</h3>
            <p class="text-xs" style="color: var(--text-tertiary)">جمع الفترة الصباحية + المسائية · ${fmtDate(new Date())}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${todayMorn ? `<span class="pill" style="background: var(--warning-soft); color: var(--warning)"><i data-lucide="sun" class="w-3 h-3"></i>صباح</span>` : ''}
          ${todayEven ? `<span class="pill" style="background: var(--info-soft); color: var(--info)"><i data-lucide="moon" class="w-3 h-3"></i>مساء</span>` : ''}
        </div>
      </div>

      <div class="grid lg:grid-cols-2 divide-x divide-x-reverse" style="">
        <!-- العمود الأيمن: الإيرادات والمصروفات -->
        <div class="p-5 border-b lg:border-b-0" style="border-color: var(--border-subtle)">
          <h4 class="text-xs font-bold uppercase tracking-wider mb-3" style="color: var(--text-tertiary)">💰 الإيرادات والمصروفات</h4>
          <div class="space-y-3">
            ${dayStatRow('إجمالي المنظومة', todayTotal.systemRevenue, cur, 'success', 'trending-up')}
            ${dayStatRow('الكاش في الدرج', todayTotal.cashActual, cur, 'success', 'banknote')}
            ${dayStatRow('إجمالي التحويلات', todayTotal.transfers, cur, 'accent', 'credit-card')}
            ${dayStatRow('إجمالي المصروفات', todayTotal.expenses, cur, 'danger', 'receipt')}
            <div class="border-t pt-3" style="border-color: var(--border-subtle)">
              ${dayStatRow('ديون جديدة اليوم', todayTotal.newDebts, cur, 'warning', 'alert-circle')}
              ${dayStatRow('تحصيلات اليوم', todayTotal.collections, cur, 'success', 'check-circle')}
            </div>
          </div>
        </div>

        <!-- العمود الأيسر: التحويلات حسب الطريقة -->
        <div class="p-5">
          <h4 class="text-xs font-bold uppercase tracking-wider mb-3" style="color: var(--text-tertiary)">💳 التحويلات حسب طريقة الدفع</h4>
          ${Object.keys(todayByMethod).length === 0 ? `
            <div class="text-center py-6" style="color: var(--text-tertiary)">
              <i data-lucide="credit-card" class="w-10 h-10 mx-auto mb-2 opacity-40"></i>
              <p class="text-sm">لا توجد تحويلات اليوم</p>
            </div>
          ` : `
            <div class="space-y-2">
              ${Object.entries(todayByMethod)
                .sort((a, b) => b[1] - a[1])
                .map(([method, amount]) => {
                  const pct = todayTotal.transfers > 0 ? (amount / todayTotal.transfers * 100) : 0;
                  return `<div class="p-3 rounded-xl" style="background: var(--bg-subtle)">
                    <div class="flex justify-between items-center mb-1.5">
                      <div class="flex items-center gap-2">
                        <i data-lucide="${method === 'كاش' ? 'banknote' : method.includes('بطاقة') || method.includes('فيزا') ? 'credit-card' : method.includes('تحويل') || method.includes('بنك') || method.includes('مصرف') ? 'landmark' : 'smartphone'}" class="w-4 h-4" style="color: var(--accent)"></i>
                        <span class="text-sm font-bold" style="color: var(--text-primary)">${method}</span>
                      </div>
                      <span class="font-bold num text-sm" style="color: var(--text-primary)">${fmt2(amount)}</span>
                    </div>
                    <div class="h-1.5 rounded-full overflow-hidden" style="background: var(--bg-hover)">
                      <div class="h-full rounded-full" style="width: ${pct}%; background: linear-gradient(90deg, var(--accent), var(--accent-light))"></div>
                    </div>
                    <div class="text-[10px] mt-1 num" style="color: var(--text-tertiary)">${pct.toFixed(1)}% من التحويلات</div>
                  </div>`;
                }).join('')}
            </div>
          `}
        </div>
      </div>

      <!-- مقارنة الفترتين -->
      <div class="p-5 border-t" style="border-color: var(--border-subtle); background: var(--bg-subtle)">
        <h4 class="text-xs font-bold uppercase tracking-wider mb-3" style="color: var(--text-tertiary)">⚖️ مقارنة الفترتين</h4>
        <div class="grid grid-cols-2 gap-3">
          ${shiftCompCard('صباحية', todayMorn, calcMorn, 'warning', 'sun', cur, tolerance)}
          ${shiftCompCard('مسائية', todayEven, calcEven, 'info', 'moon', cur, tolerance)}
        </div>
      </div>
    </div>

    <!-- ═══ آخر الإغلاقات ═══ -->
    <div class="card">
      <div class="p-4 border-b flex items-center justify-between" style="border-color: var(--border-subtle)">
        <h3 class="font-display font-bold text-lg" style="color: var(--text-primary)">آخر الإغلاقات</h3>
        <span class="text-xs" style="color: var(--text-tertiary)">${state.history.length} فترة</span>
      </div>
      <div class="divide-y" style="border-color: var(--border-subtle)">
        ${state.history.slice(0, 8).map(s => {
          const diff = calculateSheet(s).difference;
          return `<div class="p-4 flex items-center gap-3 transition" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background: ${s.shift === 'morning' ? 'var(--warning-soft)' : 'var(--info-soft)'}; color: ${s.shift === 'morning' ? 'var(--warning)' : 'var(--info)'}">
              <i data-lucide="${s.shift === 'morning' ? 'sun' : 'moon'}" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm" style="color: var(--text-primary)">${s.date} · ${s.shift === 'morning' ? 'صباحية' : 'مسائية'}</div>
              <div class="text-xs" style="color: var(--text-tertiary)">${s.closed ? `🔒 ${s.closed_by || ''}` : '🟢 مفتوحة'} · ${s.last_edited_by || '—'}</div>
            </div>
            <div class="text-left">
              <div class="font-bold num text-sm" style="color: var(--text-primary)">${fmt2(s.data?.systemTotal)}</div>
              <div class="text-xs num" style="color: ${Math.abs(diff) < 0.01 ? 'var(--success)' : Math.abs(diff) < tolerance ? 'var(--warning)' : 'var(--danger)'}">${diff > 0 ? '+' : ''}${fmt2(diff)}</div>
            </div>
          </div>`;
        }).join('') || `<div class="p-8 text-center" style="color: var(--text-tertiary)">لا توجد إغلاقات</div>`}
      </div>
    </div>
  </div>`;
}

// عرض إحصائية بسطر واحد في ملخص اليوم
function dayStatRow(label, value, currency, color, icon) {
  const colors = {
    success: 'var(--success)',
    danger: 'var(--danger)',
    warning: 'var(--warning)',
    accent: 'var(--accent)',
  };
  return `<div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <i data-lucide="${icon}" class="w-4 h-4" style="color: ${colors[color]}"></i>
      <span class="text-sm" style="color: var(--text-secondary)">${label}</span>
    </div>
    <span class="font-bold num text-base" style="color: var(--text-primary)">${fmt2(value)} <span class="text-xs" style="color: var(--text-tertiary)">${currency}</span></span>
  </div>`;
}

// بطاقة مقارنة فترة
function shiftCompCard(label, sheet, calc, color, icon, currency, tolerance) {
  const colors = { warning: 'var(--warning)', info: 'var(--info)' };
  const softs = { warning: 'var(--warning-soft)', info: 'var(--info-soft)' };
  if (!sheet) {
    return `<div class="card p-3" style="background: var(--bg-surface); opacity: 0.5">
      <div class="flex items-center gap-2 mb-2">
        <i data-lucide="${icon}" class="w-4 h-4" style="color: ${colors[color]}"></i>
        <span class="text-sm font-bold" style="color: var(--text-secondary)">${label}</span>
      </div>
      <div class="text-xs" style="color: var(--text-tertiary)">لم تبدأ بعد</div>
    </div>`;
  }
  const status = sheet.closed ? '🔒 مغلقة' : '🟢 جارية';
  return `<div class="card p-3" style="background: var(--bg-surface)">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <i data-lucide="${icon}" class="w-4 h-4" style="color: ${colors[color]}"></i>
        <span class="text-sm font-bold" style="color: var(--text-primary)">${label}</span>
      </div>
      <span class="text-[10px]" style="color: var(--text-tertiary)">${status}</span>
    </div>
    <div class="text-xl font-bold num" style="color: var(--text-primary)">${fmt2(calc.systemTotal)}</div>
    <div class="text-xs flex items-center justify-between mt-1">
      <span style="color: var(--text-tertiary)">${currency}</span>
      <span class="num font-bold" style="color: ${Math.abs(calc.difference) < 0.01 ? 'var(--success)' : Math.abs(calc.difference) < tolerance ? 'var(--warning)' : 'var(--danger)'}">${calc.difference > 0 ? '+' : ''}${fmt2(calc.difference)}</span>
    </div>
  </div>`;
}

function kpiCard(label, value, currency, icon, color, sub, signed) {
  const colors = {
    success: 'from-emerald-500 to-emerald-700',
    emerald: 'from-emerald-500 to-emerald-700',
    accent:  'from-blue-500 to-blue-700',
    indigo:  'from-indigo-500 to-indigo-700',
    warning: 'from-amber-500 to-amber-700',
    amber:   'from-amber-500 to-amber-700',
    danger:  'from-rose-500 to-rose-700',
    rose:    'from-rose-500 to-rose-700',
    info:    'from-cyan-500 to-cyan-700',
  };
  return `<div class="relative overflow-hidden rounded-2xl bg-gradient-to-br ${colors[color] || colors.accent} text-white p-4 shadow-lg">
    <i data-lucide="${icon}" class="absolute -left-3 -bottom-3 w-20 h-20 opacity-10"></i>
    <div class="text-xs opacity-90 mb-1 font-bold">${label}</div>
    <div class="text-2xl lg:text-3xl font-bold num">${signed && value > 0 ? '+' : ''}${fmt2(value)}</div>
    <div class="text-xs opacity-75 mt-1">${currency || ''}${sub ? ' · ' + sub : ''}</div>
  </div>`;
}

function pageHeader(title, subtitle, icon, actions = '') {
  return `<div class="flex items-start justify-between gap-3 mb-6 flex-wrap">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-xl flex items-center justify-center shadow-lg" style="background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #fff">
        <i data-lucide="${icon}" class="w-5 h-5"></i>
      </div>
      <div>
        <h1 class="font-display text-2xl lg:text-3xl font-bold" style="color: var(--text-primary)">${title}</h1>
        ${subtitle ? `<p class="text-sm mt-0.5" style="color: var(--text-secondary)">${subtitle}</p>` : ''}
      </div>
    </div>
    ${actions}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// 💼 صفحة إغلاق الفترة
// ═══════════════════════════════════════════════════════════════
function renderClosing() {

      </div>

          ${formField('إجمالي مبيعات المنظومة', `<input type="number" inputmode="decimal" step="0.01" data-field="systemTotal" value="${data.systemTotal}" ${closed ? 'disabled' : ''} class="${inputCls('big')}">`)}
          ${formField('العهدة الافتتاحية', `<input type="number" inputmode="decimal" step="0.01" data-field="openingCash" value="${data.openingCash}" ${closed ? 'disabled' : ''} class="${inputCls('big')}">`, 'الكاش الموجود في الدرج عند بدء الفترة')}
        </div>
      `)}

      ${section('التحويلات البنكية والبطاقات', 'مبالغ من المنظومة لم تدخل الدرج نقداً', 'credit-card', 'indigo', `
        ${itemsList(data.bankTransfers, ['description', 'method', 'amount'], ['البيان', 'الطريقة', 'المبلغ'], 'bankTransfers', closed)}
        ${!closed ? quickForm('bankTransfers', [
          { name: 'description', placeholder: 'البيان', flex: true },
          { name: 'method', placeholder: 'الطريقة', type: 'select', options: state.settings?.paymentMethods || [], width: 140 },
          { name: 'amount', placeholder: 'المبلغ', type: 'number', width: 100 },
        ], 'indigo') : ''}
        ${total('إجمالي التحويلات', calc.transfers)}
      `)}

      ${section('ديون جديدة', 'مسجلة بالمنظومة، لم تُحصّل بعد', 'alert-circle', 'amber', `
        ${itemsList(data.newDebts, ['customer', 'phone', 'amount'], ['العميل', 'الهاتف', 'المبلغ'], 'newDebts', closed)}

          { name: 'customer', placeholder: 'اسم العميل', flex: true },
          { name: 'phone', placeholder: 'الهاتف', width: 110 },

      ${section('مصروفات الفترة', 'مبالغ خرجت من الدرج', 'receipt', 'rose', `
        ${itemsList(data.expenses, ['description', 'category', 'amount'], ['البيان', 'النوع', 'المبلغ'], 'expenses', closed)}
        ${!closed ? quickForm('expenses', [
          { name: 'description', placeholder: 'البيان', flex: true },
          { name: 'category', placeholder: 'النوع', type: 'select', options: state.settings?.expenseCategories || [], width: 150 },
          { name: 'amount', placeholder: 'المبلغ', type: 'number', width: 100 },
        ], 'rose') : ''}
        ${total('إجمالي المصروفات', calc.expenses)}
      `)}

      ${section('تحصيل ديون سابقة', 'تدخل كاش الفترة (تُسجَّل من تاب الديون)', 'check-circle-2', 'emerald', `
        ${(data.debtCollections || []).length > 0 ? `<div class="space-y-2 mb-3">
          ${data.debtCollections.map(c => `<div class="flex items-center gap-3 p-2.5 bg-emerald-50 rounded-lg border border-emerald-200">
            <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-600"></i>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm truncate">${c.customer}</div>
              <div class="text-xs text-slate-500">دين أصلي: ${c.originalDate} · ${c.method || 'كاش'}</div>
            </div>
            <span class="font-bold num text-emerald-700">${fmt2(c.amount)}</span>
            ${!closed ? `<button data-undo-collect="${c.id}:${c.debtId}" class="text-rose-500 p-1 hover:bg-rose-50 rounded" title="إلغاء التحصيل"><i data-lucide="undo-2" class="w-4 h-4"></i></button>` : ''}
          </div>`).join('')}
        </div>` : '<div class="text-sm text-slate-400 text-center py-2">لا توجد تحصيلات في هذه الفترة</div>'}
        <div class="text-xs text-slate-500 bg-slate-50 p-2 rounded mb-2">💡 لتسجيل تحصيل: اذهب لتاب "إدارة الديون"، اضغط ✓ على الدين، واختر طريقة الدفع</div>
        ${total('إجمالي التحصيلات', calc.collections)}
      `)}

      ${section('الجرد الفعلي والحساب الدقيق', 'كل قرش محسوب', 'wallet', 'slate', `
        <div class="rounded-xl p-4 mb-4 border" style="background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary)); border-color: var(--border-light)">
          <div class="text-xs font-bold mb-3 uppercase tracking-wider flex items-center gap-2" style="color: var(--text-secondary)">

            <div class="flex justify-between"><span style="color: var(--text-secondary)">إجمالي المنظومة</span><span style="color: var(--text-primary)">${fmt2(calc.systemTotal)}</span></div>
            <div class="flex justify-between" style="color: var(--rose)"><span>− تحويلات وبطاقات</span><span>${fmt2(-calc.transfers)}</span></div>
            <div class="flex justify-between" style="color: var(--rose)"><span>− ديون جديدة</span><span>${fmt2(-calc.newDebts)}</span></div>
            <div class="flex justify-between font-bold border-t pt-1" style="color: var(--teal); border-color: var(--border-light)"><span>= إيراد نقدي</span><span>${fmt2(calc.cashRevenue)}</span></div>
            <div class="flex justify-between" style="color: var(--teal)"><span>+ تحصيل ديون سابقة</span><span>${fmt2(calc.collections)}</span></div>
            <div class="flex justify-between" style="color: var(--rose)"><span>− مصروفات</span><span>${fmt2(-calc.expenses)}</span></div>
            <div class="pt-2 mt-2 flex justify-between font-bold text-base px-3 py-2 rounded-lg" style="background: linear-gradient(135deg, var(--gold-soft), var(--gold-soft)); color: var(--gold); border-top: 2px solid var(--gold)">
              <span>الكاش المتوقع في الدرج</span>
              <span class="num">${fmt2(calc.expectedCash)}</span>
            </div>
          </div>
        </div>

        ${formField('💰 الكاش الفعلي في الدرج (بعد العد)', `<input type="number" inputmode="decimal" step="0.01" data-field="actualCashCount" value="${data.actualCashCount}" ${closed ? 'disabled' : ''} class="${inputCls('big bold')}">`, 'عُدّ الكاش بدقة وأدخل المبلغ كاملاً')}
        ${diffDisplay(calc.difference, tolerance, calc)}
      `)}

      ${section('ملاحظات', '', 'file-text', 'slate', `
        <textarea data-field="notes" ${closed ? 'disabled' : ''} rows="3"
          placeholder="سبب الفرق، أحداث خاصة، تنبيهات للمدير..."
          class="input-field w-full">${data.notes || ''}</textarea>
      `)}

      <div class="card p-4 flex flex-wrap gap-2">
        ${!closed ? `
          <button data-act="closeShift" class="flex-1 py-3 font-bold rounded-xl transition shadow-lg" style="background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #fff; box-shadow: 0 4px 14px rgba(245,158,11,0.3)">
            <i data-lucide="lock" class="w-4 h-4 inline ml-2"></i>إغلاق الفترة وحفظها
          </button>
        ` : state.user.role === 'admin' ? `
          <button data-act="reopenShift" class="flex-1 py-3 font-bold rounded-xl transition btn-secondary">

          </button>

      </div>
    </div>
  </div>`;
}

function inputCls(modifier = '') {
  const big = modifier.includes('big');
  const bold = modifier.includes('bold');
  return `input-field w-full ${big ? 'text-xl py-3' : 'text-base'} ${bold ? 'font-bold' : ''} num`;
}

function formField(label, input, hint) {
  return `<div>
    <label class="block text-xs font-bold mb-1" style="color: var(--text-secondary)">${label}</label>
    ${input}
    ${hint ? `<p class="text-xs mt-1" style="color: var(--text-tertiary)">${hint}</p>` : ''}
  </div>`;
}

function section(title, subtitle, icon, color, content) {
  const colors = {
    emerald: { bg: 'var(--teal-soft)', fg: 'var(--teal)' },
    indigo:  { bg: 'var(--sky-soft)', fg: 'var(--sky)' },
    amber:   { bg: 'var(--gold-soft)', fg: 'var(--gold)' },
    rose:    { bg: 'var(--rose-soft)', fg: 'var(--rose)' },
    slate:   { bg: 'var(--bg-tertiary)', fg: 'var(--text-secondary)' },
  };
  const c = colors[color];
  return `<div class="card overflow-hidden">
    <div class="p-4 flex items-center gap-3 border-b" style="border-color: var(--border-light)">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style="background: ${c.bg}; color: ${c.fg}">
        <i data-lucide="${icon}" class="w-5 h-5"></i>
      </div>
      <div class="flex-1">
        <div class="font-display text-base font-bold" style="color: var(--text-primary)">${title}</div>
        ${subtitle ? `<div class="text-xs" style="color: var(--text-tertiary)">${subtitle}</div>` : ''}
      </div>
    </div>
    <div class="p-4">${content}</div>
  </div>`;
}

function itemsList(items, fields, headers, fieldName, disabled) {
  if (!items || items.length === 0) return `<div class="text-center py-3 text-xs" style="color: var(--text-tertiary)">لا توجد عناصر</div>`;
  return `<div class="space-y-1.5 mb-3">
    ${items.map(item => `<div class="flex items-center gap-2 p-2.5 rounded-lg border text-sm" style="background: var(--bg-tertiary); border-color: var(--border-light)">
      ${fields.map((f, i) => `<div class="${i === 0 ? 'flex-1 min-w-0' : ''} ${f === 'amount' ? 'font-bold num text-left' : 'truncate'}" style="color: ${f === 'amount' ? 'var(--text-primary)' : 'var(--text-secondary)'}">${f === 'amount' ? fmt2(item[f]) : (item[f] || '—')}</div>`).join('')}
      ${!disabled ? `<button data-remove="${fieldName}:${item.id}" class="p-1 rounded shrink-0 transition" style="color: var(--rose)" onmouseover="this.style.background='var(--rose-soft)'" onmouseout="this.style.background='transparent'"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}
    </div>`).join('')}
  </div>`;
}

function quickForm(fieldName, fields, color) {
  const colors = {
    indigo: 'var(--sky)',
    amber:  'var(--gold)',
    rose:   'var(--rose)',
  };
  return `<form data-quick-form="${fieldName}" class="flex flex-wrap gap-2 p-2.5 rounded-lg border-2 border-dashed" style="background: var(--bg-tertiary); border-color: var(--border-medium)">
    ${fields.map(f => {
      const cls = `${f.flex ? 'flex-1 min-w-[100px]' : ''} input-field text-sm ${f.type === 'number' ? 'num' : ''}`;
      const style = f.width ? `style="width:${f.width}px"` : '';
      if (f.type === 'select') {
        return `<select name="${f.name}" required class="${cls}" ${style}><option value="">${f.placeholder}</option>${(f.options || []).map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
      }
      const step = f.type === 'number' ? 'step="0.01"' : '';
      return `<input name="${f.name}" type="${f.type || 'text'}" ${step} placeholder="${f.placeholder}" class="${cls}" ${style}>`;
    }).join('')}
    <button type="submit" class="text-white px-4 rounded-lg text-sm font-bold transition flex items-center gap-1" style="background: ${colors[color]}; box-shadow: 0 2px 8px ${colors[color]}40">
      <i data-lucide="plus" class="w-4 h-4"></i>إضافة
    </button>
  </form>`;
}

function total(label, value) {
  return `<div class="flex justify-between items-center pt-3 mt-3 border-t" style="border-color: var(--border-light)">
    <span class="text-sm font-bold" style="color: var(--text-secondary)">${label}</span>
    <span class="text-lg font-bold num" style="color: var(--text-primary)">${fmt2(value)}</span>
  </div>`;
}

function diffDisplay(difference, tolerance, calc) {
  const abs = Math.abs(difference);
  const status = abs < 0.01 ? 'match' : abs < tolerance ? 'warn' : 'error';
  const styles = {
    match: { bg: 'bg-emerald-50 border-emerald-300', text: 'text-emerald-700', icon: '✅', msg: 'مطابقة تامة — كل قرش محسوب.' },
    warn:  { bg: 'bg-amber-50 border-amber-300', text: 'text-amber-700', icon: '⚠️', msg: difference > 0 ? 'فرق بسيط (زيادة) — راجع التحصيلات والإدخالات.' : 'فرق بسيط (عجز) — راجع المصروفات.' },
    error: { bg: 'bg-rose-50 border-rose-300', text: 'text-rose-700', icon: '❌', msg: difference > 0 ? 'زيادة كبيرة — هل سجّلت تحصيلاً أو إيراداً مفقوداً؟' : 'عجز كبير — هل توجد مصروفات أو تحويلات غير مسجلة؟' },
  };
  const s = styles[status];
  return `<div class="mt-3 p-4 rounded-xl border-2 ${s.bg}">
    <div class="flex justify-between items-center">
      <div>
        <div class="text-xs font-bold text-slate-600 mb-1">الفرق (فعلي − متوقع)</div>
        <div class="text-2xl font-bold num ${s.text}">${difference > 0 ? '+' : ''}${fmt2(difference)}</div>
      </div>
      <div class="text-3xl">${s.icon}</div>
    </div>
    <div class="text-xs mt-2 text-slate-700">${s.msg}</div>
    ${status !== 'match' ? `
      <div class="mt-3 pt-3 border-t border-slate-200 grid grid-cols-2 gap-2 text-xs">
        <div class="bg-white p-2 rounded">
          <div class="text-slate-500">المتوقع</div>
          <div class="font-bold num text-base">${fmt2(calc.expectedCash)}</div>
        </div>
        <div class="bg-white p-2 rounded">
          <div class="text-slate-500">الفعلي</div>
          <div class="font-bold num text-base">${fmt2(calc.actualCash)}</div>
        </div>
      </div>
    ` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// 💳 صفحة الديون (مع نوافذ التحصيل والتعديل)
// ═══════════════════════════════════════════════════════════════
function renderDebts() {
  const filter = state.debtFilter;
  const search = state.debtSearch;
  const today = new Date().toISOString().split('T')[0];

  let filtered = state.debts;
  if (filter === 'open') filtered = filtered.filter(d => d.status === 'open');
  else if (filter === 'paid') filtered = filtered.filter(d => d.status === 'paid');
  if (search) filtered = filtered.filter(d => d.customer?.toLowerCase().includes(search.toLowerCase()) || d.phone?.includes(search));

  const openTotal = round2(state.debts.filter(d => d.status === 'open').reduce((s, d) => s + Number(d.amount), 0));
  const openCount = state.debts.filter(d => d.status === 'open').length;
  const isAdmin = state.user.role === 'admin';

  return `<div class="p-4 lg:p-8 max-w-5xl mx-auto">
    ${pageHeader('إدارة الديون', isAdmin ? `${openCount} دين مفتوح · إجمالي ${fmt2(openTotal)} ${state.settings?.currency || ''}` : `${openCount} دين مفتوح`, 'book-open')}

    ${section('➕ إضافة دين يدوي', 'للديون الخارجة عن الفترة', 'plus', 'amber', `
      <form data-quick-form="manualDebt" class="flex flex-wrap gap-2">
        <input name="customer" placeholder="اسم العميل" required class="flex-1 min-w-[120px] input-field text-sm">

        <button data-filter="all"  class="px-3 py-1.5 rounded-md text-sm transition" style="${filter==='all'?'background: var(--bg-secondary); font-weight: 700; box-shadow: var(--shadow-sm); color: var(--text-primary)':'color: var(--text-secondary)'}">الكل</button>

      ${filtered.length === 0 ? `<div class="p-12 text-center" style="color: var(--text-tertiary)">لا توجد ديون</div>` :
        filtered.map(d => debtRow(d, today)).join('')
      }
    </div>
  </div>`;
}

function debtRow(d, today) {
  const daysOpen = d.status === 'open' ? Math.floor((new Date(today) - new Date(d.date_added)) / 86400000) : 0;
  const overdue = daysOpen > 7;
  const isPaid = d.status === 'paid';
  const iconBg = isPaid ? 'var(--teal-soft)' : overdue ? 'var(--rose-soft)' : 'var(--gold-soft)';
  const iconFg = isPaid ? 'var(--teal)' : overdue ? 'var(--rose)' : 'var(--gold)';
  return `<div class="p-4 transition" style="border-color: var(--border-light)" onmouseover="this.style.background='var(--bg-tertiary)'" onmouseout="this.style.background='transparent'">
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background: ${iconBg}; color: ${iconFg}">
        <i data-lucide="${isPaid ? 'check' : 'clock'}" class="w-5 h-5"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-sm" style="color: var(--text-primary)">${d.customer}</div>
        <div class="text-xs num" style="color: var(--text-tertiary)">
          ${d.phone ? '📱 ' + d.phone + ' · ' : ''}سُجل ${d.date_added}
          ${d.status === 'open' ? ' · ' + daysOpen + ' يوم' : ' · سُدد ' + d.paid_date}
          ${isPaid && d.payment_method ? ` · <span class="px-1.5 py-0.5 rounded text-[10px] font-bold" style="background: var(--sky-soft); color: var(--sky)">${d.payment_method}</span>` : ''}
        </div>
        <div class="text-[10px] mt-0.5" style="color: var(--text-tertiary)">
          أضافه: ${d.added_by || '—'}
          ${isPaid ? ` · حصّل: ${d.paid_by || '—'}` : ''}
        </div>
      </div>
      <div class="text-left shrink-0">
        <div class="font-bold num text-base" style="color: var(--text-primary)">${fmt2(d.amount)}</div>
        <div class="flex gap-1 mt-1 justify-end flex-wrap">
          ${!isPaid ? `
            <button data-collect="${d.id}" class="text-white text-xs font-bold px-3 py-1 rounded-lg transition" style="background: var(--teal); box-shadow: 0 2px 6px rgba(13,148,136,0.3)" title="تسجيل تحصيل">
              <i data-lucide="check" class="w-3 h-3 inline"></i> تحصيل
            </button>
          ` : `
            <button data-fix-method="${d.id}" class="text-white text-xs font-bold px-2 py-1 rounded-lg transition" style="background: var(--sky)" title="تصحيح طريقة الدفع">
              <i data-lucide="credit-card" class="w-3 h-3 inline"></i> تصحيح
            </button>
            <button data-undo-paid="${d.id}" class="text-white text-xs font-bold px-2 py-1 rounded-lg transition" style="background: var(--gold)" title="تراجع عن التحصيل">
              <i data-lucide="undo-2" class="w-3 h-3 inline"></i> تراجع
            </button>
          `}
          <button data-edit-debt="${d.id}" class="text-xs font-bold px-2 py-1 rounded-lg transition btn-secondary" title="تعديل">
            <i data-lucide="edit-2" class="w-3 h-3"></i>
          </button>
          ${state.user.role === 'admin' ? `<button data-deldebt="${d.id}" class="p-1 rounded-lg transition" style="background: var(--bg-tertiary); color: var(--rose)" title="حذف"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

          div.style.background = 'var(--success-soft)';

    updateRadioStyles();
    document.querySelectorAll('input[name="method"]').forEach(radio => {

        }
      });
    });
  }, 100);
}

// 📅 صفحة السجل التاريخي (مع إخفاء الأرقام عن موظف الاستقبال)
// ═══════════════════════════════════════════════════════════════
function renderHistory() {
  const isAdmin = state.user.role === 'admin';
  const month = state.historyMonth;
  const filtered = state.history.filter(s => s.date?.startsWith(month));
  const monthStats = filtered.reduce((acc, s) => {
    const c = calculateSheet(s);
    return {
      revenue: round2(acc.revenue + c.systemTotal),
      expenses: round2(acc.expenses + c.expenses),
      debts: round2(acc.debts + c.newDebts),
      diffAbs: round2(acc.diffAbs + Math.abs(c.difference)),
    };
  }, { revenue: 0, expenses: 0, debts: 0, diffAbs: 0 });

  return `<div class="p-4 lg:p-8 max-w-6xl mx-auto">
    ${pageHeader('السجل التاريخي', isAdmin ? 'كل الإغلاقات السابقة' : 'فترات الشهر', 'calendar')}

    <div class="card p-3 mb-4 flex items-center gap-3">
      <i data-lucide="calendar" class="w-4 h-4" style="color: var(--text-tertiary)"></i>
      <input id="historyMonth" type="month" value="${month}" class="input-field text-sm num">
      <span class="text-sm" style="color: var(--text-tertiary)">(${filtered.length} إغلاق)</span>
    </div>

    ${isAdmin ? `
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        ${miniStat('إيراد الشهر', monthStats.revenue, state.settings?.currency, 'emerald')}
        ${miniStat('مصروفات', monthStats.expenses, state.settings?.currency, 'rose')}
        ${miniStat('ديون', monthStats.debts, state.settings?.currency, 'amber')}
        ${miniStat('فروقات', monthStats.diffAbs, state.settings?.currency, 'slate')}
      </div>
    ` : `
      <div class="card p-4 mb-4 flex items-center gap-3" style="background: linear-gradient(135deg, var(--gold-soft), transparent)">
        <i data-lucide="info" class="w-5 h-5 shrink-0" style="color: var(--gold)"></i>
        <p class="text-sm" style="color: var(--text-secondary)">إجماليات الشهر متاحة في حساب المدير فقط.</p>
      </div>
    `}

    <div class="card divide-y" style="border-color: var(--border-light)">
      ${filtered.length === 0 ? `<div class="p-12 text-center" style="color: var(--text-tertiary)">لا توجد إغلاقات</div>` :
        filtered.map(s => {
          const c = calculateSheet(s);
          const tol = state.settings?.diffTolerance || 50;
          return `<div class="p-4 flex items-center gap-3 transition" style="border-color: var(--border-light)" onmouseover="this.style.background='var(--bg-tertiary)'" onmouseout="this.style.background='transparent'">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background: ${s.shift === 'morning' ? 'var(--gold-soft)' : 'var(--sky-soft)'}; color: ${s.shift === 'morning' ? 'var(--gold)' : 'var(--sky)'}">
              <i data-lucide="${s.shift === 'morning' ? 'sun' : 'moon'}" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm num" style="color: var(--text-primary)">${s.date} · ${s.shift === 'morning' ? 'صباحية' : 'مسائية'}</div>
              <div class="text-xs" style="color: var(--text-tertiary)">${s.closed ? '🔒 ' + (s.closed_by || '') : '🟢 مفتوحة'}</div>
            </div>
            ${isAdmin ? `
              <div class="text-left">
                <div class="font-bold num text-sm" style="color: var(--text-primary)">${fmt2(c.systemTotal)}</div>
                <div class="text-xs num" style="color: ${Math.abs(c.difference) < 0.01 ? 'var(--teal)' : Math.abs(c.difference) < tol ? 'var(--gold)' : 'var(--rose)'}">${c.difference > 0 ? '+' : ''}${fmt2(c.difference)}</div>
              </div>
            ` : `
              <div class="text-left">
                <span class="text-xs px-2 py-1 rounded-full font-bold" style="background: ${s.closed ? 'var(--teal-soft)' : 'var(--gold-soft)'}; color: ${s.closed ? 'var(--teal)' : 'var(--gold)'}">

                </span>
              </div>
            `}
          </div>`;
        }).join('')
      }
    </div>
  </div>`;
}

function miniStat(label, value, currency, color) {
  const colors = {
    emerald: { bg: 'var(--teal-soft)', fg: 'var(--teal)' },
    rose:    { bg: 'var(--rose-soft)', fg: 'var(--rose)' },
    amber:   { bg: 'var(--gold-soft)', fg: 'var(--gold)' },
    slate:   { bg: 'var(--bg-tertiary)', fg: 'var(--text-secondary)' },
  };
  const c = colors[color];
  return `<div class="rounded-xl p-3 border" style="background: ${c.bg}; border-color: var(--border-light)">
    <div class="text-xs font-bold mb-1 opacity-75" style="color: ${c.fg}">${label}</div>
    <div class="text-xl font-bold num" style="color: ${c.fg}">${fmt2(value)}</div>
    <div class="text-[10px] opacity-60" style="color: ${c.fg}">${currency || ''}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// 📊 صفحة التقارير
// ═══════════════════════════════════════════════════════════════
function renderReports() {
  const days = 30;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const recent = state.history.filter(s => new Date(s.date) >= cutoff);
  const totals = recent.reduce((acc, s) => {
    const c = calculateSheet(s);
    acc.revenue += c.systemTotal;
    acc.expenses += c.expenses;
    acc.debts += c.newDebts;
    acc.collections += c.collections;
    if (s.shift === 'morning') acc.morning += c.systemTotal;
    if (s.shift === 'evening') acc.evening += c.systemTotal;
    (s.data?.expenses || []).forEach(e => {
      acc.byCategory[e.category] = (acc.byCategory[e.category] || 0) + Number(e.amount || 0);
    });
    (s.data?.bankTransfers || []).forEach(t => {
      acc.byMethod[t.method] = (acc.byMethod[t.method] || 0) + Number(t.amount || 0);
    });
    return acc;
  }, { revenue: 0, expenses: 0, debts: 0, collections: 0, morning: 0, evening: 0, byCategory: {}, byMethod: {} });

  Object.keys(totals.byCategory).forEach(k => totals.byCategory[k] = round2(totals.byCategory[k]));
  Object.keys(totals.byMethod).forEach(k => totals.byMethod[k] = round2(totals.byMethod[k]));

  return `<div class="p-4 lg:p-8 max-w-6xl mx-auto">
    ${pageHeader('التقارير المالية', `آخر ${days} يوم`, 'bar-chart-3')}
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
      ${kpiCard('الإيراد', round2(totals.revenue), state.settings?.currency, 'trending-up', 'emerald')}
      ${kpiCard('المصروفات', round2(totals.expenses), state.settings?.currency, 'receipt', 'rose')}
      ${kpiCard('ديون جديدة', round2(totals.debts), state.settings?.currency, 'alert-circle', 'amber')}
      ${kpiCard('تحصيلات', round2(totals.collections), state.settings?.currency, 'check-circle-2', 'indigo')}
    </div>
    <div class="grid lg:grid-cols-2 gap-4 mb-4">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
        <h3 class="font-display font-bold mb-3">الإيراد حسب الفترة</h3>
        ${compBar('صباحية', totals.morning, totals.revenue, 'amber')}
        ${compBar('مسائية', totals.evening, totals.revenue, 'indigo')}
      </div>
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
        <h3 class="font-display font-bold mb-3">المصروفات حسب الفئة</h3>
        ${Object.entries(totals.byCategory).map(([k, v]) => compBar(k, v, totals.expenses, 'rose')).join('') || '<div class="text-sm text-slate-400 text-center py-4">لا توجد مصروفات</div>'}
      </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
      <h3 class="font-display font-bold mb-3">طرق الدفع غير النقدية</h3>
      ${Object.entries(totals.byMethod).map(([k, v]) => compBar(k, v, Object.values(totals.byMethod).reduce((s,x)=>s+x,0), 'indigo')).join('') || '<div class="text-sm text-slate-400 text-center py-4">لا توجد تحويلات</div>'}
    </div>
  </div>`;
}

function compBar(label, value, total, color) {
  const pct = total > 0 ? (value / total) * 100 : 0;
  const colors = {
    amber: 'from-amber-400 to-amber-600',
    indigo: 'from-indigo-400 to-indigo-600',
    rose: 'from-rose-400 to-rose-600',
  };
  return `<div class="mb-2">
    <div class="flex justify-between text-xs mb-1">
      <span class="font-bold text-slate-700">${label}</span>
      <span class="num text-slate-600">${fmt2(value)} <span class="text-slate-400">(${pct.toFixed(1)}%)</span></span>
    </div>
    <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
      <div class="h-full bg-gradient-to-l ${colors[color]}" style="width:${pct}%"></div>
    </div>
  </div>`;
}

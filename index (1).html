// ═══════════════════════════════════════════════════════════════
// 🎯 معالجات الأحداث
// ═══════════════════════════════════════════════════════════════
function attachMainHandlers() {
  document.querySelectorAll('[data-act="logout"]').forEach(b => b.onclick = async () => {
    await api.log(state.user.username, 'logout', 'سجّل الخروج');
    state.user = null; render();
  });

  document.querySelectorAll('[data-nav]').forEach(b => b.onclick = async () => {
    state.page = b.dataset.nav;
    state.loading = true; render();
    await loadPageData();
    state.loading = false; render();
  });

  // ═══ صفحة الإغلاق ═══
  if (state.page === 'closing') {
    document.getElementById('sheetDate')?.addEventListener('change', async (e) => {
      state.sheetDate = e.target.value;
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      render();
    });
    document.querySelectorAll('[data-shift]').forEach(b => b.onclick = async () => {
      state.sheetShift = b.dataset.shift;
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      render();
    });

    let saveTimer;
    document.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('input', async (e) => {
        const data = { ...(state.sheet?.data || emptySheet()), [e.target.dataset.field]: e.target.value };
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
          state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
        }, 600);
      });
    });

    document.querySelectorAll('[data-quick-form]').forEach(f => f.onsubmit = async (e) => {
      e.preventDefault();
      const field = f.dataset.quickForm;
      const formData = Object.fromEntries(new FormData(f));
      if (field === 'newDebts') {
        if (!formData.customer || !formData.amount) return;
        const id = uid();
        const data = state.sheet?.data || emptySheet();
        data.newDebts = [...(data.newDebts || []), { id, ...formData, amount: round2(formData.amount), addedBy: state.user.username }];
        await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
        await api.addDebt({
          id, customer: formData.customer, phone: formData.phone || '',
          amount: round2(formData.amount), date_added: state.sheetDate, shift: state.sheetShift,
          status: 'open', added_by: state.user.username
        });
        await api.log(state.user.username, 'add_debt', `دين جديد: ${formData.customer} - ${formData.amount}`);
        toast('✓ تمت إضافة الدين', 'success');
      } else {
        if (!formData.amount) return;
        const id = uid();
        const data = state.sheet?.data || emptySheet();
        data[field] = [...(data[field] || []), { id, ...formData, amount: round2(formData.amount) }];
        await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
        toast('✓ تمت الإضافة', 'success');
      }
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      render();
    });

    document.querySelectorAll('[data-remove]').forEach(b => b.onclick = async () => {
      const [field, id] = b.dataset.remove.split(':');
      const data = state.sheet?.data || emptySheet();
      data[field] = (data[field] || []).filter(x => String(x.id) !== id);
      await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      render();
    });

    // إلغاء تحصيل من داخل الشيت
    document.querySelectorAll('[data-undo-collect]').forEach(b => b.onclick = async () => {
      const [collectId, debtId] = b.dataset.undoCollect.split(':');
      if (!confirm('إلغاء هذا التحصيل وإرجاع الدين مفتوحاً؟')) return;
      const data = state.sheet?.data || emptySheet();
      data.debtCollections = (data.debtCollections || []).filter(c => String(c.id) !== collectId);
      await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
      await api.updateDebt(debtId, { status: 'open', paid_date: null, paid_shift: null, paid_by: null, payment_method: null });
      await api.log(state.user.username, 'undo_collect', `ألغى تحصيل دين`);
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      state.debts = await api.getDebts();
      toast('✓ تم إلغاء التحصيل', 'warn');
      render();
    });

    document.querySelector('[data-act="closeShift"]')?.addEventListener('click', async () => {
      const tol = state.settings?.diffTolerance || 50;
      const calc = calculateSheet(state.sheet);
      if (Math.abs(calc.difference) >= tol && !state.sheet?.data?.notes?.trim()) {
        alert(`الفرق ${fmt2(calc.difference)} تجاوز الحد. اكتب سبب الفرق في الملاحظات قبل الإغلاق.`);
        return;
      }
      if (!confirm('تأكيد إغلاق الفترة؟ بعد الإغلاق لن يقدر الموظفون تعديلها.')) return;
      const data = { ...(state.sheet?.data || emptySheet()), closed: true, closedBy: state.user.display_name || state.user.username, closedAt: Date.now() };
      await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
      await api.log(state.user.username, 'close_shift', `أغلق ${state.sheetDate} ${state.sheetShift}`);
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      toast('🔒 تم إغلاق الفترة', 'success');
      render();
    });

    document.querySelector('[data-act="reopenShift"]')?.addEventListener('click', async () => {
      if (!confirm('فتح الفترة المغلقة؟')) return;
      const data = { ...(state.sheet?.data || emptySheet()), closed: false };
      await api.saveSheet(state.sheetDate, state.sheetShift, data, state.user.username);
      await api.log(state.user.username, 'reopen_shift', `أعاد فتح ${state.sheetDate} ${state.sheetShift}`);
      state.sheet = await api.getSheet(state.sheetDate, state.sheetShift);
      toast('🔓 تم فتح الفترة', 'info');
      render();
    });
  }

  // ═══ صفحة الديون ═══
  if (state.page === 'debts') {
    document.querySelectorAll('[data-filter]').forEach(b => b.onclick = () => {
      state.debtFilter = b.dataset.filter; render();
    });

    document.getElementById('debtSearch')?.addEventListener('input', (e) => {
      state.debtSearch = e.target.value;
      const list = document.querySelector('.bg-white.divide-y');
      if (list) {
        const today = new Date().toISOString().split('T')[0];
        let f = state.debts;
        if (state.debtFilter === 'open') f = f.filter(d => d.status === 'open');
        else if (state.debtFilter === 'paid') f = f.filter(d => d.status === 'paid');
        if (state.debtSearch) f = f.filter(d => d.customer?.toLowerCase().includes(state.debtSearch.toLowerCase()) || d.phone?.includes(state.debtSearch));
        list.innerHTML = f.length === 0 ? '<div class="p-12 text-center text-slate-400">لا توجد ديون</div>' : f.map(d => debtRow(d, today)).join('');
        lucide.createIcons();
        attachDebtRowHandlers();
      }
    });

    attachDebtRowHandlers();

    document.querySelector('[data-quick-form="manualDebt"]')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(e.target));
      if (!formData.customer || !formData.amount) return;
      const today = new Date().toISOString().split('T')[0];
      await api.addDebt({
        id: uid(), customer: formData.customer, phone: formData.phone || '',
        amount: round2(formData.amount), date_added: today,
        shift: new Date().getHours() < 14 ? 'morning' : 'evening',
        status: 'open', added_by: state.user.username
      });
      await api.log(state.user.username, 'add_debt_manual', `أضاف دين يدوي: ${formData.customer}`);
      state.debts = await api.getDebts();
      toast('✓ تمت إضافة الدين', 'success');
      render();
    });
  }

  // ═══ السجل التاريخي ═══
  if (state.page === 'history') {
    document.getElementById('historyMonth')?.addEventListener('change', (e) => {
      state.historyMonth = e.target.value; render();
    });
  }

  // ═══ المستخدمون ═══
  if (state.page === 'users') {
    document.querySelector('[data-act="showAddUser"]')?.addEventListener('click', () => { state.showAddUser = true; render(); });
    document.querySelector('[data-act="cancelUserForm"]')?.addEventListener('click', () => { state.showAddUser = false; state.editingUser = null; render(); });
    document.querySelectorAll('[data-edituser]').forEach(b => b.onclick = () => { state.editingUser = b.dataset.edituser; render(); });
    document.querySelectorAll('[data-deluser]').forEach(b => b.onclick = async () => {
      if (!confirm('حذف المستخدم؟')) return;
      await api.deleteUser(b.dataset.deluser);
      await api.log(state.user.username, 'delete_user', `حذف ${b.dataset.deluser}`);
      state.users = await api.getUsers();
      toast('✓ تم الحذف', 'warn');
      render();
    });
    document.querySelectorAll('[data-user-form]').forEach(f => f.onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(f));
      data.active = true;
      await api.upsertUser(data);
      await api.log(state.user.username, 'save_user', `حفظ المستخدم ${data.username}`);
      state.users = await api.getUsers();
      state.showAddUser = false; state.editingUser = null;
      toast('✓ تم الحفظ', 'success');
      render();
    });
  }

  // ═══ الإعدادات ═══
  if (state.page === 'settings') {
    // رفع الشعار
    document.getElementById('logoUpload')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 500 * 1024) {
        alert('⚠️ حجم الصورة يجب أن يكون أقل من ٥٠٠ ك.ب');
        return;
      }
      const reader = new FileReader();
      reader.onload = async (event) => {
        const dataUrl = event.target.result;
        const newSettings = { ...state.settings, customLogo: dataUrl };
        await api.saveSettings(newSettings);
        await api.log(state.user.username, 'update_logo', 'حدّث شعار المختبر');
        state.settings = newSettings;
        toast('✓ تم تحديث الشعار', 'success');
        render();
      };
      reader.readAsDataURL(file);
    });

    // إزالة الشعار المخصص
    document.querySelector('[data-act="removeLogo"]')?.addEventListener('click', async () => {
      if (!confirm('إزالة الشعار المخصص واستخدام الشعار الافتراضي؟')) return;
      const newSettings = { ...state.settings };
      delete newSettings.customLogo;
      await api.saveSettings(newSettings);
      await api.log(state.user.username, 'remove_logo', 'أزال الشعار المخصص');
      state.settings = newSettings;
      toast('✓ تم إزالة الشعار', 'info');
      render();
    });

    document.querySelector('[data-act="saveSettings"]')?.addEventListener('click', async () => {
      const f = document.getElementById('settingsForm');
      const fd = Object.fromEntries(new FormData(f));
      const newSettings = {
        ...state.settings,
        labName: fd.labName, currency: fd.currency,
        expenseCategories: fd.expenseCategories.split(',').map(x => x.trim()).filter(Boolean),
        paymentMethods: fd.paymentMethods.split(',').map(x => x.trim()).filter(Boolean),
        diffTolerance: Number(fd.diffTolerance),
      };
      await api.saveSettings(newSettings);
      await api.log(state.user.username, 'update_settings', 'حدّث الإعدادات');
      state.settings = newSettings;
      toast('✓ تم حفظ الإعدادات', 'success');
      render();
    });
  }
}

function attachDebtRowHandlers() {
  document.querySelectorAll('[data-collect]').forEach(b => b.onclick = () => {
    const debt = state.debts.find(d => d.id === b.dataset.collect);
    if (debt) showCollectModal(debt);
  });
  document.querySelectorAll('[data-edit-debt]').forEach(b => b.onclick = () => {
    const debt = state.debts.find(d => d.id === b.dataset.editDebt);
    if (debt) showEditDebtModal(debt);
  });
  document.querySelectorAll('[data-undo-paid]').forEach(b => b.onclick = () => {
    const debt = state.debts.find(d => d.id === b.dataset.undoPaid);
    if (debt) showUndoCollectionModal(debt);
  });
  document.querySelectorAll('[data-fix-method]').forEach(b => b.onclick = () => {
    const debt = state.debts.find(d => d.id === b.dataset.fixMethod);
    if (debt) showFixMethodModal(debt);
  });
  document.querySelectorAll('[data-deldebt]').forEach(b => b.onclick = async () => {
    if (!confirm('حذف الدين نهائياً؟ هذا الإجراء لا يمكن التراجع عنه.')) return;
    await api.deleteDebt(b.dataset.deldebt);
    await api.log(state.user.username, 'delete_debt', 'حذف دين');
    state.debts = await api.getDebts();
    toast('✓ تم الحذف', 'warn');
    render();
  });
}

function attachModalHandlers() {
  // نموذج التحصيل
  document.getElementById('collectForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    const debt = state.debts.find(d => d.id === fd.debtId);
    if (!debt) return;

    // استخدم تاريخ التسديد المختار من المستخدم
    const paidDate = fd.paidDate || new Date().toISOString().split('T')[0];
    // حدد الفترة بناءً على وقت التسديد
    const shift = new Date().getHours() < 14 ? 'morning' : 'evening';
    const sheet = await api.getSheet(paidDate, shift);
    const data = sheet?.data || emptySheet();

    if (data.closed) {
      alert('⚠️ الفترة المختارة مغلقة. اطلب من المدير فتحها أولاً.');
      return;
    }

    const amount = round2(fd.amount);
    const method = fd.method;
    const collectionId = uid();

    // 🎯 المنطق المحاسبي الدقيق:
    // كاش → يضاف لتحصيل الديون فقط (يدخل الدرج)
    // غير كاش (تحويل/فيزا/إنستاباي) → يضاف للتحويلات البنكية فقط (لا يدخل الدرج)
    // كلاهما يُحسب في "إيراد التحصيلات" لكن مساره مختلف في معادلة الكاش
    if (method === 'كاش') {
      data.debtCollections = [...(data.debtCollections || []), {
        id: collectionId, customer: debt.customer, amount,
        originalDate: debt.date_added, debtId: debt.id, method: 'كاش',
        collectedBy: state.user.username, notes: fd.notes || ''
      }];
    } else {
      // غير كاش → فقط في التحويلات البنكية مع علامة واضحة
      data.bankTransfers = [...(data.bankTransfers || []), {
        id: collectionId,
        description: `💰 تحصيل دين: ${debt.customer}`,
        method, amount,
        isDebtCollection: true,
        debtId: debt.id,
        originalDate: debt.date_added,
        collectedBy: state.user.username,
        notes: fd.notes || ''
      }];
    }

    await api.saveSheet(paidDate, shift, data, state.user.username);
    await api.updateDebt(debt.id, {
      status: 'paid', paid_date: paidDate, paid_shift: shift,
      paid_by: state.user.username, payment_method: method
    });
    await api.log(state.user.username, 'collect_debt', `حصّل ${debt.customer} (${amount} ${method}) بتاريخ ${paidDate}`);

    state.debts = await api.getDebts();
    closeModal();
    toast(`✓ تم تحصيل ${fmt2(amount)} (${method})`, 'success');
    render();
  });

  // نموذج التعديل
  document.getElementById('editDebtForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    await api.updateDebt(fd.debtId, {
      customer: fd.customer, phone: fd.phone || '', amount: round2(fd.amount), notes: fd.notes || ''
    });
    await api.log(state.user.username, 'edit_debt', `عدّل دين ${fd.customer}`);
    state.debts = await api.getDebts();
    closeModal();
    toast('✓ تم حفظ التعديلات', 'success');
    render();
  });

  // 🔧 نموذج تصحيح طريقة الدفع (المنطق المحاسبي الذكي)
  document.getElementById('fixMethodForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    const debt = state.debts.find(d => d.id === fd.debtId);
    if (!debt) return;

    const newMethod = fd.method;
    const oldMethod = debt.payment_method || 'كاش';

    if (newMethod === oldMethod) {
      toast('الطريقة لم تتغير', 'info');
      closeModal();
      return;
    }

    // اجلب فترة التحصيل
    const sheet = await api.getSheet(debt.paid_date, debt.paid_shift);
    if (!sheet) {
      alert('⚠️ لم يُعثر على فترة التحصيل');
      return;
    }

    if (sheet.closed && state.user.role !== 'admin') {
      alert('⚠️ فترة التحصيل مغلقة. اطلب من المدير فتحها أولاً.');
      return;
    }

    const data = sheet.data || emptySheet();
    const amount = round2(debt.amount);

    // 🎯 المنطق الذكي:
    // إذا كانت قديماً كاش والآن غير كاش:
    //   احذف من debtCollections (كانت تدخل الدرج) → أضف لـ bankTransfers
    // إذا كانت قديماً غير كاش والآن كاش:
    //   احذف من bankTransfers → أضف لـ debtCollections

    // ١. احذف الإدخالات القديمة المرتبطة بهذا الدين
    data.debtCollections = (data.debtCollections || []).filter(c => c.debtId !== debt.id);
    data.bankTransfers = (data.bankTransfers || []).filter(t => !(t.isDebtCollection && t.debtId === debt.id));

    // ٢. أضف الإدخال الجديد حسب الطريقة
    const newId = uid();
    if (newMethod === 'كاش') {
      data.debtCollections.push({
        id: newId, customer: debt.customer, amount,
        originalDate: debt.date_added, debtId: debt.id, method: 'كاش',
        collectedBy: state.user.username,
        notes: `[تصحيح طريقة] من ${oldMethod} إلى كاش بواسطة ${state.user.username}`
      });
    } else {
      data.bankTransfers.push({
        id: newId,
        description: `💰 تحصيل دين: ${debt.customer}`,
        method: newMethod, amount,
        isDebtCollection: true,
        debtId: debt.id,
        originalDate: debt.date_added,
        collectedBy: state.user.username,
        notes: `[تصحيح طريقة] من ${oldMethod} إلى ${newMethod} بواسطة ${state.user.username}`
      });
    }

    // ٣. احفظ الفترة المصححة
    await api.saveSheet(debt.paid_date, debt.paid_shift, data, state.user.username);

    // ٤. حدّث طريقة الدفع في جدول الديون
    await api.updateDebt(debt.id, { payment_method: newMethod });

    // ٥. سجل العملية
    await api.log(state.user.username, 'fix_payment_method',
      `صحّح طريقة دفع دين ${debt.customer} من ${oldMethod} إلى ${newMethod}`);

    state.debts = await api.getDebts();
    closeModal();
    toast(`✓ تم التصحيح من "${oldMethod}" إلى "${newMethod}"`, 'success');
    render();
  });
}

// إرجاع دين مسدد إلى مفتوح (مع تصحيح الفترة)
window.__confirmUndoCollect = async (debtId) => {
  const debt = state.debts.find(d => d.id === debtId);
  if (!debt) return;

  // ابحث في الفترة التي سُجّل فيها التحصيل
  const sheet = await api.getSheet(debt.paid_date, debt.paid_shift);
  if (sheet?.closed) {
    alert('⚠️ فترة التحصيل مغلقة. اطلب من المدير فتحها أولاً.');
    return;
  }

  // احذف من تحصيلات الفترة
  if (sheet) {
    const data = sheet.data || emptySheet();
    data.debtCollections = (data.debtCollections || []).filter(c => c.debtId !== debtId);
    data.bankTransfers = (data.bankTransfers || []).filter(t => t.debtId !== debtId);
    await api.saveSheet(debt.paid_date, debt.paid_shift, data, state.user.username);
  }

  // أعد الدين إلى مفتوح
  await api.updateDebt(debtId, {
    status: 'open', paid_date: null, paid_shift: null, paid_by: null, payment_method: null
  });
  await api.log(state.user.username, 'undo_collect', `ألغى تحصيل ${debt.customer}`);
  state.debts = await api.getDebts();
  closeModal();
  toast('✓ تم إرجاع الدين مفتوحاً', 'warn');
  render();
};

boot();
</script>
